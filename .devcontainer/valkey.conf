[program:valkey]
command=valkey-server --bind 127.0.0.1 --port 6379 --dir /workspaces/jobs/database
autostart=true
autorestart=true
user=ubuntu
stdout_logfile=/workspaces/jobs/storage/logs/valkey.log
stderr_logfile=/workspaces/jobs/storage/logs/valkey.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=0
